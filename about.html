<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpFelix | 关于我</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/about.css">
</head>
<body>
    <!-- 动态背景 -->
    <div class="bg-container"></div>

    <!-- 导航栏容器 -->
    <div id="header-container"></div>

    <!-- 个人简介 -->
    <section class="about-section" id="about">
        <div class="container">
            <div class="about-header">
                <h1>关于我</h1>
                <div class="divider"></div>
            </div>

            <!-- 个人信息卡片 -->
            <div class="profile-card">
                <div class="profile-image">
                    <img src="img\avatar\抱着娃娃哭.png" alt="头像">
                    <div class="profile-overlay"></div>
                </div>
                <div class="profile-info">
                    <h2>OpFelix</h2>
                    <p class="title">运维工程师 | 开源爱好者</p>
                    <div class="social-links">
                        <a href="https://github.com/opfelix" target="_blank" class="social-icon">
                            <img src="img\icon\github.svg" alt="GitHub">
                        </a>
                    </div>
                </div>
            </div>

            <!-- 个人简介内容 -->
            <div class="about-content">
                <div class="content-section">
                    <h3>个人简介</h3>
                    <p>
                        一名热爱技术的运维工程师，专研Linux系统管理、自动化运维和云原生技术。
                    </p>
                </div>

                <div class="content-section">
                    <h3>专业技能</h3>
                    <div class="skills-grid">
                        <div class="skill-item">Linux</div>
                        <div class="skill-item">Python</div>
                        <div class="skill-item">Shell</div>
                        <div class="skill-item">Docker</div>
                    </div>
                </div>
            </div>

            <!-- 证书奖项 -->
            <div class="certificates-section">
                <h2>证书奖项</h2>
                <div class="divider"></div>
                <div class="certificates-grid">
                    <div class="cert-item" onclick="openCertModal(0)">
                        <!-- <span class="cert-icon">🏆</span> -->
                        <span class="cert-name">H3CNE-RS+</span>
                    </div>
                        <div class="cert-item" onclick="openCertModal(1)">
                        <!-- <span class="cert-icon">🏆</span> -->
                        <span class="cert-name">H3CNE-Security</span>
                    </div>
                </div>
            </div>

            <!-- 证书详情弹窗 -->
            <div id="certModal" class="modal" onclick="closeCertModal()">
                <div class="modal-content" onclick="event.stopPropagation()">
                    <span class="close-btn" onclick="closeCertModal()">&times;</span>
                    <div class="cert-detail-header">
                        <div class="cert-detail-icon" id="certDetailIcon"></div>
                        <div class="cert-detail-info">
                            <h3 id="certDetailTitle"></h3>
                            <p id="certDetailDate"></p>
                            <span class="cert-detail-badge" id="certDetailBadge"></span>
                        </div>
                    </div>
                    <div class="cert-detail-image-container">
                        <img id="certDetailImage" src="" alt="证书图片">
                        <div class="image-zoom-hint">点击图片放大查看</div>
                    </div>
                    <div class="cert-detail-desc">
                        <p id="certDetailDesc"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部容器 -->
    <div id="footer-container"></div>

    <script src="js/common.js"></script>
    <script src="js/about.js"></script>
</body>
</html>
